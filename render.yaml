services:
  - type: web
    name: crop-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_interface:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        fromService:
          type: web
          property: port

